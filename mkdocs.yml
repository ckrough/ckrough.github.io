site_name: Chris Krough
site_url: https://ckrough.github.io
site_description: Engineering Leader | Platform Architecture | AI/ML | Cloud Infrastructure
site_author: Chris Krough

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - navigation.top
  font:
    text: Inter
    code: Fira Code

nav:
  - Home: index.md
  - Services: services.md
  - Experience: experience.md
  - Projects:
    - Overview: projects/index.md
    - Drover: projects/drover.md
    - AI/ML Projects: projects/ai-projects.md
    - Platform Engineering: projects/platform.md
  - Contact: contact.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ckrough/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ckrough
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:chris@krough.org
      name: Email

copyright: Copyright &copy; 2025 Chris Krough
